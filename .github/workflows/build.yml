name: Build & Package

on:
  # The full pipeline (macOS/Windows builds, signing, notarization, release) is
  # expensive, so it runs only on version tags — plus a manual button to
  # validate a branch on demand before tagging, without burning minutes on
  # every push/PR.
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (Apple Silicon + Intel)
    runs-on: macos-15
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Bundle .app (ad-hoc signed)
        env:
          BINARY_PATH: target/${{ matrix.target }}/release/holler
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then export VERSION="${GITHUB_REF_NAME#v}"; fi
          bash scripts/bundle-macos.sh
          mv Holler.app Holler-${{ matrix.target }}.app

      - name: Create DMG
        run: |
          ARCH=${{ matrix.target }}
          hdiutil create -volname Holler \
            -srcfolder Holler-$ARCH.app \
            -ov -format UDZO \
            Holler-$ARCH.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Holler-macOS-${{ matrix.target }}
          path: Holler-${{ matrix.target }}.dmg

  # ─── Universal macOS DMG (arm64 + x86_64 fat binary) ───────────────────────
  build-macos-universal:
    name: macOS Universal (fat binary)
    needs: build-macos
    runs-on: macos-15
    # The signing secrets live in the "ENV" environment, so this job must opt
    # into it to read them.
    environment: ENV
    # Surface signing secrets as env so steps can gate on them (the `secrets`
    # context is not allowed in `if:`). Empty when unconfigured → ad-hoc path.
    env:
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-universal-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build both arches
        run: |
          cargo build --locked --release --target aarch64-apple-darwin
          cargo build --locked --release --target x86_64-apple-darwin

      - name: Lipo into universal binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/aarch64-apple-darwin/release/holler \
            target/x86_64-apple-darwin/release/holler \
            -output target/universal-apple-darwin/release/holler

      # Import the Developer ID cert into a throwaway keychain so codesign can
      # find it. Skipped (→ ad-hoc signing) until the secret is configured.
      - name: Import signing certificate
        if: env.MACOS_CERT_P12_BASE64 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

      - name: Bundle universal .app
        env:
          BINARY_PATH: target/universal-apple-darwin/release/holler
          # Empty when unconfigured → bundle-macos.sh falls back to ad-hoc.
          SIGN_IDENTITY: ${{ env.MACOS_SIGN_IDENTITY }}
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then export VERSION="${GITHUB_REF_NAME#v}"; fi
          bash scripts/bundle-macos.sh

      # Notarize + staple the .app FIRST, so the app a user drags out of the DMG
      # is self-contained and passes Gatekeeper even offline. Skipped until
      # secrets are configured.
      - name: Notarize & staple the app
        if: env.APPLE_ID != ''
        run: |
          ditto -c -k --keepParent Holler.app Holler-app.zip
          xcrun notarytool submit Holler-app.zip \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple Holler.app

      - name: Create universal DMG
        run: |
          hdiutil create -volname Holler \
            -srcfolder Holler.app \
            -ov -format UDZO \
            Holler-macOS-universal.dmg

      # Sign the DMG with Developer ID, then notarize + staple it so the DMG
      # itself (not just its contents) passes Gatekeeper, even offline. Skipped
      # until secrets are configured.
      - name: Sign, notarize & staple the DMG
        if: env.APPLE_ID != ''
        run: |
          codesign --force --timestamp --sign "$MACOS_SIGN_IDENTITY" Holler-macOS-universal.dmg
          xcrun notarytool submit Holler-macOS-universal.dmg \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple Holler-macOS-universal.dmg

      - name: Upload universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: Holler-macOS-universal
          path: Holler-macOS-universal.dmg

  # ─── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: Run tests
        run: cargo test --locked --target x86_64-pc-windows-msvc

      - name: Package ZIP
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME.Substring(1) } else { '0.1.0' }
          pwsh scripts\bundle-windows.ps1 `
            -BinaryPath target\x86_64-pc-windows-msvc\release\holler.exe `
            -Version $v

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Holler-Windows-x64
          path: Holler-Windows-x64-v*.zip

  # ─── Release (tags only) ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos-universal, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout (for license files)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Holler-macOS-universal.dmg
            Holler-Windows-x64-v*.zip
            LICENSE-MIT
            LICENSE-APACHE
          generate_release_notes: true
